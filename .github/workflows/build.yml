name: Build Signed Android APK/AAB

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      output_format:
        description: "Output Format"
        required: true
        default: "aab"
        type: choice
        options:
          - apk
          - aab
          - both
      should_sign:
        description: "Sign the build?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          ls -lh release.keystore
          echo "✅ Keystore decoded"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        id: sign_apk
        run: |
          # Find the unsigned APK
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*-release-unsigned.apk" -o -name "*-release.apk" | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            ls -R android/app/build/outputs/apk/release/
            exit 1
          fi
          
          echo "📦 Found APK: $APK_PATH"
          
          # Check if build-tools exist
          if [ ! -d "$ANDROID_HOME/build-tools/34.0.0" ]; then
            echo "⚠️ build-tools 34.0.0 not found, searching for available versions..."
            BUILD_TOOLS_VERSION=$(ls -1 $ANDROID_HOME/build-tools/ | sort -V | tail -1)
            echo "Using build-tools version: $BUILD_TOOLS_VERSION"
            BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION"
          else
            BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/34.0.0"
          fi
          
          echo "Build tools path: $BUILD_TOOLS_PATH"
          
          # Align the APK
          echo "🔧 Aligning APK..."
          $BUILD_TOOLS_PATH/zipalign -v -p 4 "$APK_PATH" release-aligned.apk
          
          # Sign the APK
          echo "🔐 Signing APK..."
          $BUILD_TOOLS_PATH/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out release-signed.apk \
            release-aligned.apk
          
          echo "✅ APK signed successfully"
          echo "signed_apk_path=release-signed.apk" >> $GITHUB_OUTPUT

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Sign AAB
        run: |
          # Find the AAB
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          
          if [ -z "$AAB_PATH" ]; then
            echo "❌ AAB not found!"
            ls -R android/app/build/outputs/bundle/release/
            exit 1
          fi
          
          echo "📦 Found AAB: $AAB_PATH"
          
          # Sign using jarsigner
          echo "🔐 Signing AAB..."
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "$AAB_PATH" \
            "${{ secrets.KEY_ALIAS }}"
          
          # Copy to predictable location
          cp "$AAB_PATH" release-signed.aab
          echo "✅ AAB signed successfully"

      - name: Verify APK signature
        run: |
          echo "📦 Verifying APK signature..."
          
          # Find build-tools
          if [ ! -d "$ANDROID_HOME/build-tools/34.0.0" ]; then
            BUILD_TOOLS_VERSION=$(ls -1 $ANDROID_HOME/build-tools/ | sort -V | tail -1)
            BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION"
          else
            BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/34.0.0"
          fi
          
          # Verify signature exists
          if $BUILD_TOOLS_PATH/apksigner verify release-signed.apk 2>&1 | grep -q "Verified"; then
            echo "✅ APK is properly signed"
            
            # Show certificate details
            echo ""
            echo "=== Certificate Information ==="
            $BUILD_TOOLS_PATH/apksigner verify --print-certs release-signed.apk
          else
            echo "❌ APK signature verification failed!"
            $BUILD_TOOLS_PATH/apksigner verify release-signed.apk
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.run_number }}
          path: release-signed.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.run_number }}
          path: release-signed.aab
          retention-days: 30

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f release.keystore
          rm -f release-aligned.apk
          echo "✅ Cleanup completed"
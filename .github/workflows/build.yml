name: Build Signed Android APK/AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache NPM (fallback)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (npm)
        run: |
          set -euo pipefail
          # Prefer reproducible CI installs when package-lock.json exists
          if [ -f package-lock.json ]; then
            echo "Using npm ci (package-lock.json found)"
            npm ci --prefer-offline --no-audit --no-fund
          else
            echo "No package-lock.json found — running npm install (will generate a lockfile locally in the runner)"
            npm install --no-audit --no-fund
          fi

      - name: Decode release keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ Missing secret: KEYSTORE_BASE64" >&2
            exit 1
          fi
          # Decode without adding a trailing newline that could corrupt the keystore
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          mkdir -p android/app
          mv release.keystore android/app/release.keystore
          chmod 600 android/app/release.keystore
          echo "Decoded keystore to android/app/release.keystore"

      - name: Verify keystore (sanity)
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "Keystore file:"
          ls -l android/app/release.keystore
          # Print keystore entry info for debugging (masked in logs)
          keytool -list -v -keystore android/app/release.keystore -storepass "${KEYSTORE_PASSWORD}" -alias "${KEY_ALIAS}" || true

      - name: Build Android AAB (bundleRelease)
        shell: bash
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euo pipefail
          cd android
          # Inject signing properties so Gradle uses the exact key and does not sign the AAB twice
          ./gradlew clean bundleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon --console=plain

      - name: Inspect produced AAB for multiple certificate chains
        shell: bash
        run: |
          set -euo pipefail
          AAB_PATH=$(find android/app/build/outputs/bundle -type f -iname "*.aab" | sort | tail -n1 || true)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ AAB not found in android/app/build/outputs/bundle"
            ls -R android/app/build/outputs || true
            exit 1
          fi
          echo "Produced AAB: $AAB_PATH"
          echo "META-INF signature files:"
          unzip -Z1 "$AAB_PATH" | grep -E '^META-INF/.*\.(RSA|DSA|EC|SF)$' || true

          SIG_COUNT=$(unzip -Z1 "$AAB_PATH" | grep -E '^META-INF/.*\.(RSA|DSA|EC)$' | wc -l || true)
          echo "Signature blocks found: $SIG_COUNT"
          if [ "$SIG_COUNT" -gt 1 ]; then
            echo "❌ ERROR: AAB contains more than one certificate chain. Play Store will reject this AAB."
            echo "--- List of signature files ---"
            unzip -Z1 "$AAB_PATH" | grep -E '^META-INF/.*\.(RSA|DSA|EC|SF)$' || true
            echo
            echo "--- jarsigner verify output ---"
            jarsigner -verify -verbose -certs "$AAB_PATH" || true
            echo
            echo "--- Certificate subjects ---"
            set +e
            for f in $(unzip -Z1 "$AAB_PATH" | grep -E '^META-INF/.*\.(RSA|DSA|EC)$' || true); do
              echo "---- $f ----"
              unzip -p "$AAB_PATH" "$f" 2>/dev/null | keytool -printcert -v -file /dev/stdin || true
            done
            exit 1
          fi
          echo "✅ AAB contains exactly one certificate chain (or none found)."

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle